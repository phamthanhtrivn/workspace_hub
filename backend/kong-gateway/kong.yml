_format_version: "3.0"
_transform: true

consumers:
  - username: workspace-hub-api
    jwt_secrets:
      - key: workspace-hub
        secret: $JWT_SECRET_KEY
        algorithm: HS256

services:
  - name: user-service
    url: http://host.docker.internal:8081
    routes:
      - name: auth-routes
        paths:
          - /api/auth
        strip_path: false

      - name: user-routes
        paths:
          - /api/users
        strip_path: false

  - name: project-service
    url: http://host.docker.internal:8082
    routes:
      - name: project-routes
        paths:
          - /api/projects
          - /api/tasks
          - /api/pomodoros
        strip_path: false

plugins:
  - name: cors
    config:
      origins:
        - $FRONTEND_URL
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - Origin
        - X-Requested-With
        - Cookie
      exposed_headers:
        - Set-Cookie
      credentials: true

  - name: jwt
    route: user-routes
    config:
      claims_to_verify:
        - exp

  - name: jwt
    route: project-routes
    config:
      claims_to_verify:
        - exp

  - name: pre-function
    route: user-routes
    config:
      access:
        - |
          local auth = kong.request.get_header("Authorization")
          if auth then
            local _, _, token = string.find(auth, "Bearer%s+(.+)")
            if token then
              local p64 = ""
              local i = 0
              for p in string.gmatch(token, "[^%.]+") do
                i = i + 1
                if i == 2 then p64 = p; break end
              end
              if p64 ~= "" then
                local rem = #p64 % 4
                if rem > 0 then p64 = p64 .. string.rep("=", 4 - rem) end
                p64 = string.gsub(p64, "-", "+")
                p64 = string.gsub(p64, "_", "/")
                local p_str = ngx.decode_base64(p64)
                if p_str then
                  local _, _, sub = string.find(p_str, '"sub"%s*:%s*"([^"]+)"')
                  if sub then kong.service.request.set_header("X-User-Id", sub) end
                end
              end
            end
          end

  - name: pre-function
    route: project-routes
    config:
      access:
        - |
          local auth = kong.request.get_header("Authorization")
          if auth then
            local _, _, token = string.find(auth, "Bearer%s+(.+)")
            if token then
              local p64 = ""
              local i = 0
              for p in string.gmatch(token, "[^%.]+") do
                i = i + 1
                if i == 2 then p64 = p; break end
              end
              if p64 ~= "" then
                local rem = #p64 % 4
                if rem > 0 then p64 = p64 .. string.rep("=", 4 - rem) end
                p64 = string.gsub(p64, "-", "+")
                p64 = string.gsub(p64, "_", "/")
                local p_str = ngx.decode_base64(p64)
                if p_str then
                  local _, _, sub = string.find(p_str, '"sub"%s*:%s*"([^"]+)"')
                  if sub then kong.service.request.set_header("X-User-Id", sub) end
                end
              end
            end
          end
