_format_version: "3.0"
_transform: true

services:
  - name: user-service
    url: http://host.docker.internal:8081
    routes:
      - name: user-routes
        paths:
          - /api/users
          - /api/auth
        strip_path: false

  - name: project-service
    url: http://host.docker.internal:8082
    routes:
      - name: project-routes
        paths:
          - /api/projects
          - /api/tasks
          - /api/pomodoros
        strip_path: false

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - Origin
        - X-Requested-With
      credentials: true
