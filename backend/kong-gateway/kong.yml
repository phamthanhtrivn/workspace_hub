_format_version: "3.0"
_transform: true

consumers:
  - username: workspace-hub-api
    jwt_secrets:
      - key: workspace-hub
        secret: $JWT_SECRET_KEY
        algorithm: HS256

services:
  - name: user-service
    url: http://host.docker.internal:8081
    routes:
      - name: auth-routes
        paths:
          - /api/auth
        strip_path: false

      - name: user-routes
        paths:
          - /api/users
        strip_path: false

  - name: project-service
    url: http://host.docker.internal:8082
    routes:
      - name: project-routes
        paths:
          - /api/projects
          - /api/tasks
          - /api/pomodoros
        strip_path: false

plugins:
  - name: cors
    config:
      origins:
        - $FRONTEND_URL
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - Origin
        - X-Requested-With
        - Cookie
      exposed_headers:
        - Set-Cookie
      credentials: true

  - name: jwt
    route: user-routes
    config:
      claims_to_verify:
        - exp

  - name: jwt
    route: project-routes
    config:
      claims_to_verify:
        - exp
