version: '3.8'

services:
  kong:
    build: 
      context: ../kong-gateway
      dockerfile: Dockerfile
    container_name: workspace_hub_kong
    env_file:
      - ../kong-gateway/.env
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/tmp/kong.yml
      - KONG_PLUGINS=bundled,jwt-user-context
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001, 0.0.0.0:8444 ssl
    command: >
      /bin/sh -c "
      sed -e \"s|\\$$FRONTEND_URL|$$FRONTEND_URL|g\" -e \"s|\\$$JWT_SECRET_KEY|$$JWT_SECRET_KEY|g\" /usr/local/kong/declarative/kong.yml > /tmp/kong.yml &&
      /docker-entrypoint.sh kong docker-start"
    ports:
      - "8000:8000" # Proxy HTTP Port
      - "8443:8443" # Proxy HTTPS Port
      - "8001:8001" # Admin HTTP Port
      - "8444:8444" # Admin HTTPS Port
    volumes:
      - ../kong-gateway/kong.yml:/usr/local/kong/declarative/kong.yml
    restart: on-failure

  postgres:
    image: postgres:15-alpine
    container_name: workspace_hub_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: workspace_hub_redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    restart: always

  kafka:
    image: apache/kafka:latest
    container_name: workspace_hub_kafka
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    restart: always


volumes:
  postgres_data:
  redis_data:

