version: '3.8'

services:
  kong:
    image: kong:latest
    container_name: workspace_hub_kong
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/usr/local/kong/declarative/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001, 0.0.0.0:8444 ssl
    ports:
      - "8000:8000" # Proxy HTTP Port
      - "8443:8443" # Proxy HTTPS Port
      - "8001:8001" # Admin HTTP Port
      - "8444:8444" # Admin HTTPS Port
    volumes:
      - ../kong-gateway:/usr/local/kong/declarative
    restart: on-failure

  postgres:
    image: postgres:15-alpine
    container_name: workspace_hub_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
